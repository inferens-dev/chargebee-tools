<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>inferens.dev — Tools</title>
  <style>
    :root {
      color-scheme: light dark;
      --fg: #0f172a;
      --bg: #ffffff;
      --muted: #64748b;
      --accent: #0891b2;
      --border: #e2e8f0;
      --brand: #0891b2;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --fg: #f1f5f9;
        --bg: #0a0f1a;
        --muted: #94a3b8;
        --accent: #22d3ee;
        --border: #334155;
        --brand: #22d3ee;
      }
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      max-width: 760px;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
      color: var(--fg);
      background: var(--bg);
      line-height: 1.55;
    }
    h1 { margin-top: 0; font-size: 1.75rem; letter-spacing: -0.5px; }
    h1 .tld { color: var(--brand); font-weight: 800; }
    p.lede { color: var(--muted); margin-bottom: 2rem; }
    ul.tools {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    ul.tools li {
      padding: 0.9rem 0;
      border-bottom: 1px solid var(--border);
    }
    ul.tools li:last-child { border-bottom: none; }
    ul.tools a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    ul.tools a:hover { text-decoration: underline; }
    ul.tools .desc {
      display: block;
      color: var(--muted);
      font-size: 0.92rem;
      margin-top: 0.2rem;
    }
    .empty {
      color: var(--muted);
      font-style: italic;
      padding: 2rem 0;
      text-align: center;
    }
    footer {
      margin-top: 3rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.85rem;
    }
    footer a { color: var(--muted); }
  </style>
</head>
<body>
  <h1>inferens<span class="tld">.dev</span></h1>
  <p class="lede">A collection of small standalone web tools for Chargebee.</p>

  <ul class="tools">
    <li>
      <a href="translation-editor.html">Translation Editor</a>
      <span class="desc">Edit Chargebee language pack translations side-by-side with AI-assisted translation.</span>
    </li>
  </ul>

  <footer>
    Source on <a href="https://github.com/">GitHub</a>.
  </footer>
</body>
</html>
